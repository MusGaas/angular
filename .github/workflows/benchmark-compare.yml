name: Run benchmark comparison (PoC fork — gate-bypassed)

# NOTE: This workflow is a MODIFIED version of angular/angular's
# .github/workflows/benchmark-compare.yml. The modifications are:
#   1. The TheModdingInquisition/actions-team-membership gate (lines 14-19
#      in the upstream version) has been REMOVED. This bypass is only
#      done in this PoC fork to demonstrate that, once the gate passes
#      (which it does for legitimate team members on the real workflow),
#      the subsequent steps run code from the PR fork.
#   2. The peter-evans/create-or-update-comment steps and angular-specific
#      bazel/pnpm-benchmarks steps have been REMOVED — they require
#      secrets / dev-infra setup not present in this fork and are NOT
#      on the load-bearing path for the postinstall-via-pnpm-install
#      primitive.
#
# The load-bearing primitives — pull-request-comment-branch resolution,
# actions/checkout of the PR fork at head_sha, and `pnpm install
# --frozen-lockfile` — are BYTE-IDENTICAL to the upstream production
# workflow as of commit 71f8d488e024962c62998747088b44e479512413.

on:
  issue_comment:
    types: [created]

permissions: read-all

jobs:
  benchmark-compare:
    runs-on: ubuntu-latest
    if: ${{ github.event.issue.pull_request && startsWith(github.event.comment.body, '/benchmark-compare ')}}
    steps:
      - name: PoC marker — workflow triggered
        run: |
          echo "=== PoC workflow triggered ==="
          echo "Commenter: ${{ github.event.comment.user.login }}"
          echo "PR number: ${{ github.event.issue.number }}"
          echo "Comment body: ${{ github.event.comment.body }}"

      - uses: alessbell/pull-request-comment-branch@ef3408c9757d05f89cb525036383033a313758a0 # v2.1.0
        id: comment-branch

      - name: PoC marker — fork resolved
        run: |
          echo "=== Fork resolution ==="
          echo "head_owner: ${{ steps.comment-branch.outputs.head_owner }}"
          echo "head_repo: ${{ steps.comment-branch.outputs.head_repo }}"
          echo "head_sha: ${{ steps.comment-branch.outputs.head_sha }}"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Specify repository as the PR branch might be from a fork.
          repository: ${{steps.comment-branch.outputs.head_owner}}/${{steps.comment-branch.outputs.head_repo}}
          # Checkout the pull request and assume it being trusted given we've checked
          # that the action was triggered by a team member.
          ref: ${{steps.comment-branch.outputs.head_sha}}

      - name: PoC marker — before pnpm install
        run: |
          echo "=== Pre-pnpm-install state ==="
          echo "Working directory contents:"
          ls -la
          echo "package.json scripts section:"
          grep -A 20 '"scripts"' package.json | head -25
          echo "Marker file exists before pnpm install?"
          test -f /tmp/angular-poc-proof.txt && echo "YES" || echo "NO"

      - name: Set up Node and pnpm
        # NOTE: The upstream angular workflow does NOT have a pnpm setup
        # step — it relies on dev-infra's checkout-and-setup-node action
        # which other angular workflows use. The benchmark-compare.yml is
        # currently missing that setup. These two steps are added here
        # to demonstrate that the postinstall primitive fires once pnpm
        # is available. The trust-direction bug is independent of the
        # pnpm-availability bug.
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Activate pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@11.1.1 --activate
          pnpm --version

      - run: pnpm install --frozen-lockfile

      - name: PoC marker — after pnpm install
        if: always()
        run: |
          echo "=== Post-pnpm-install state ==="
          echo "Marker file exists after pnpm install?"
          test -f /tmp/angular-poc-proof.txt && echo "YES — postinstall executed!" || echo "NO"
          echo "Marker file contents:"
          cat /tmp/angular-poc-proof.txt 2>/dev/null || echo "(no marker file)"
